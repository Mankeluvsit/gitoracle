version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/gitoracle:cached
    command: sleep infinity
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      BROWSER: none
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - mongo
    networks:
      - gitoracle-net

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gitoracle-net

volumes:
  mongo-data:

networks:
  gitoracle-net:
