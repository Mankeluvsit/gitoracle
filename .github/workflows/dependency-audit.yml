name: Dependency audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then yarn --frozen-lockfile; else npm ci; fi
      - name: Run npm audit
        run: |
          npm audit --json > ../test_reports/frontend_audit.json || true
      - name: Upload frontend audit report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-report
          path: test_reports/frontend_audit.json

  python-audit:
    name: Python pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit against requirements.txt
        run: |
          mkdir -p test_reports
          python -m pip_audit -r backend/requirements.txt --format=json > test_reports/python_audit.json || true
      - name: Upload python audit report
        uses: actions/upload-artifact@v4
        with:
          name: python-audit-report
          path: test_reports/python_audit.json
